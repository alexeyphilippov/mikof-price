# Локальная разработка: hot-reload и bind-mount исходников (применяется автоматически).
services:
  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips='*'"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

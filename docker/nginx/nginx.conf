events {}

http {
    upstream backend { server backend:8000; }
    upstream frontend { server frontend:5173; }
    upstream grafana { server grafana:3000; }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name mikofai.ru;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        server_name mikofai.ru;

        ssl_certificate     /etc/nginx/certs/Пользовательский_сертификат.pem;
        ssl_certificate_key /etc/nginx/certs/Приватный_ключ.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        location /api/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # Grafana только под /bi (доступ ограничен ролью админа на уровне приложения/басик-аутх)
        location /bi/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
        }

        location / { proxy_pass http://frontend; proxy_set_header Host $host; }
    }
}

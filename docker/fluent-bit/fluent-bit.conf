[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info

[INPUT]
    Name              tail
    Path              /logs/audit.log
    Tag               mikofai.audit
    Refresh_Interval  5
    Read_from_Head    true

[INPUT]
    Name              tail
    Path              /logs/health.log
    Tag               mikofai.health
    Refresh_Interval  5
    Read_from_Head    true

[FILTER]
    Name   modify
    Match  mikofai.audit
    Add    stream audit

[FILTER]
    Name   modify
    Match  mikofai.health
    Add    stream health

[OUTPUT]
    Name        loki
    Match       *
    Host        loki
    Port        3100
    Labels      job=mikofai
    Label_keys  $stream

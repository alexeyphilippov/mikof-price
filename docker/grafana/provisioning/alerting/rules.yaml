apiVersion: 1

groups:
  - orgId: 1
    name: availability
    folder: Mikofai
    interval: 1m
    rules:
      - uid: mikofai-availability
        title: "Mikofai: сервисы недоступны (health-check)"
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          summary: "Нет успешного health-check за 5 минут — проверьте доступность сервисов сайта."
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              expr: 'sum(count_over_time({job="mikofai", stream="health"} |~ "status=up" [5m]))'
              queryType: instant
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C

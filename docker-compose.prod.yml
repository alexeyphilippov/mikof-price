# Продакшн-надстройка (применяется на mikofai.ru):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Добавляет nginx+SSL, мониторинг (Grafana/Loki/Fluent Bit) и бэкапы БД.
services:
  backend:
    command: sh -c "alembic upgrade head && python -m scripts.seed && gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:8000"
    environment:
      FORWARDED_ALLOW_IPS: "*"
    ports: []
    volumes:
      - app_logs:/logs

  frontend:
    build:
      context: ./frontend
      target: prod
    command: ["nginx", "-g", "daemon off;"]
    volumes: []
    ports: []

  healthcheck:
    image: busybox:1.36
    restart: always
    depends_on: [backend, mailer, frontend]
    volumes:
      - app_logs:/logs
      - ./docker/healthcheck/healthcheck.sh:/healthcheck.sh:ro
    entrypoint: ["sh", "/healthcheck.sh"]

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on: [backend, frontend, grafana]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot

  grafana:
    image: grafana/grafana:11.3.0
    restart: always
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://mikofai.ru/bi/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.mail.selcloud.ru:1126
      GF_SMTP_USER: ${SMTP_LOGIN}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${MAIL_FROM:-noreply@mikofai.ru}
      GF_SMTP_FROM_NAME: Mikofai Monitoring
      GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
      GF_SMTP_SKIP_VERIFY: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro

  loki:
    image: grafana/loki:3.2.0
    restart: always
    command: -config.file=/etc/loki/local-config.yaml

  fluent-bit:
    image: fluent/fluent-bit:3.1
    restart: always
    depends_on: [loki]
    volumes:
      - ./docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - app_logs:/logs:ro

  backup:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pg_backups:/backups
      - ./docker/backup/backup.sh:/backup.sh:ro
    entrypoint: ["sh", "-c", "while true; do sh /backup.sh; sleep 86400; done"]

volumes:
  grafana_data:
  certbot_www:
  app_logs:
